<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killinkere Match Analysis - All Games (FULL DATA) - Updated</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .game-selector { background: white; padding: 20px; margin: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .game-selector label { font-size: 1.2em; font-weight: bold; color: #2c3e50; margin-right: 15px; }
        .game-selector select { font-size: 1.1em; padding: 10px 20px; border-radius: 5px; border: 2px solid #2a5298; background: white; cursor: pointer; min-width: 500px; }
        .game-selector select:hover { border-color: #1e3c72; }
        iframe { width: 100%; height: calc(100vh - 100px); border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 20px 20px 20px; background: white; }
        .loading { text-align: center; padding: 50px; color: white; font-size: 1.5em; }
    </style>
</head>
<body>
    <div class="game-selector">
        <label for="gameSelect">Select Match:</label>
        <select id="gameSelect" onchange="loadGame()">
            <option value="">-- Choose a game --</option>
            <optgroup label="Ulster Spring League 2026">
                <option value="Killinkere 1 - 14 v 1 - 12 Clones_FULL_infographic.html">Killinkere 1-14 (17pts) vs Clones 1-12 (15pts) - 8/2/2026 ✓</option>
                <option value="Killinkere 3 - 11 v 1 - 13 Denn_FULL_infographic.html">Killinkere 3-11 (20pts) vs Denn 1-13 (16pts) - 15/2/2026 ✓</option>
                <option value="Killinkere 3 - 14 v 1 - 10 Pearse OG_FULL_infographic.html">Killinkere 3-14 (23pts) vs Pearse OG 1-10 (13pts) - 22/2/2026 ✓</option>
                <option value="Killinkere 4 - 10 v 2 - 8 Liatroim_FULL_infographic.html">Killinkere 4-10 (22pts) vs Liatroim 2-8 (14pts) - Q-Final 15/3/2026 ✓</option>
                <option value="Killinkere 0 - 8 v 0 - 13 Greenlough_FULL_infographic.html">Killinkere 0-8 (8pts) vs Greenlough 0-13 (13pts) - Semi-Final 22/3/2026 ✓</option>
            </optgroup>
            <optgroup label="Challenges 2026">
                <option value="Killinkere 4 - 9 v 0 - 12 Aughadrumsee_FULL_infographic.html">Killinkere 4-9 (21pts) vs Aughadrumsee 0-12 (12pts) - 27/2/2026 ✓</option>
                <option value="Killinkere 4 - 16 v 2 - 6 Ballymahon_FULL_infographic.html">Killinkere 4-16 (28pts) vs Ballymahon 2-6 (12pts) - 7/3/2026 ✓</option>
                <option value="Killinkere 2 - 13 v 3 - 7 Drung_FULL_infographic.html">Killinkere 2-13 (19pts) vs Drung 3-7 (16pts) - 17/3/2026 ✓</option>
            </optgroup>
            <optgroup label="ACFL Division 3 2026">
                <option value="Killinkere 4 - 10 v 3 - 20 Denn_FULL_infographic.html">Killinkere 3-8 (17pts) vs Denn 3-19 (28pts) - Rnd 1 28/3/2026 ✓</option>
            </optgroup>
            <optgroup label="ACFL Reserve League 2026">
                <option value="Killinkere 1 - 13 v 1 - 13 Arva_FULL_infographic.html">Killinkere 1-13 (16pts) vs Arva 1-13 (16pts) - 21/3/2026 ✓</option>
            </optgroup>
        </select>
    </div>
    
    <div id="content">
        <div class="loading">👆 Select a match from the dropdown above to view the complete analysis</div>
    </div>
    
    <script>
        function loadGame() {
            const select = document.getElementById('gameSelect');
            const content = document.getElementById('content');
            const gameFile = select.value;
            
            if (gameFile) {
                // Add timestamp to prevent caching
                const timestamp = new Date().getTime();
                content.innerHTML = '<iframe src="' + gameFile + '?v=' + timestamp + '"></iframe>';
            } else {
                content.innerHTML = '<div class="loading">👆 Select a match from the dropdown above to view the complete analysis</div>';
            }
        }
        
        // Auto-load first game on page load
        window.addEventListener('load', function() {
            const select = document.getElementById('gameSelect');
            select.selectedIndex = 1; // Select first game
            loadGame();
        });
    </script>
<script src="../nav.js"></script><script src="../auth.js"></script></body>
</html>
