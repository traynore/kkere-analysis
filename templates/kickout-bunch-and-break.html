<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kickout: Bunch & Break</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
  h1 { color: #f0f0f0; margin-bottom: 8px; font-size: 1.4rem; }
  .subtitle { color: #aaa; margin-bottom: 16px; font-size: 0.9rem; }
  canvas { border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  .legend { display: flex; gap: 20px; margin-top: 12px; color: #ccc; font-size: 0.8rem; align-items: center; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 4px; }
</style>
</head>
<body>
<h1>Kickout Strategy: Bunch & Break</h1>
<p class="subtitle">Looping animation — players bunch at centre then break into space</p>
<div id="phase-label" style="height: 28px; margin-bottom: 8px; font: bold 15px -apple-system, sans-serif; color: #d4a017; text-align: center;"></div>
<canvas id="pitch" width="1000" height="600"></canvas>
<div class="legend">
  <span><span class="legend-dot" style="background:#2e8b2e;"></span> Our players</span>
  <span><span class="legend-dot" style="background:#d4a017;"></span> Movement trails</span>
  <span style="color:#666;">Red dashed arc = exclusion zone</span>
</div>

<script>
const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// Landscape pitch: our goal on the LEFT, attacking towards RIGHT
const PITCH = {
  top: 30,
  bottom: H - 30,
  left: 40,
  right: W - 40,
  midX: W / 2,
  goalX: 40,
  line45: 40 + (W - 80) * 0.30,
  line21: 40 + (W - 80) * 0.14,
  arcRadius: (H - 60) * 0.28,
  arcCentreX: 40 + (W - 80) * 0.09,
  arcCentreY: H / 2,
};

const GREEN = '#2e8b2e';
const GOLD = '#d4a017';
const DARK_GREEN = '#1a5c1a';

// === PLAYER POSITIONS ===

// 1 - GK: starts at goal, kicks from just inside 20m line
const GK_START = { x: PITCH.goalX + 20, y: H / 2 };
const GK_KICKOUT = { x: PITCH.line21 - 20, y: H / 2 };

// 2 - Corner back (top pocket outside arc)
const CB2 = { x: PITCH.line21 + 30, y: PITCH.top + 55 };

// 3 - Full back (top of the large arc)
const FB3 = { x: PITCH.arcCentreX + PITCH.arcRadius + 15, y: H / 2 };

// 4 - Corner back (bottom pocket outside arc)
const CB4 = { x: PITCH.line21 + 30, y: PITCH.bottom - 55 };

// 5 - Wing back (top sideline, just past the 45m line)
const WB5_START = { x: PITCH.line45 + 30, y: PITCH.top + 10 };

// 7 - Wing back (bottom sideline, just past the 45m line)
const WB7_START = { x: PITCH.line45 + 30, y: PITCH.bottom - 10 };

// 13, 14, 15 - Attackers (must stay in attacking half)
const ATT13 = { x: PITCH.midX + (PITCH.right - PITCH.midX) * 0.4, y: H / 2 - 80 };
const ATT14 = { x: PITCH.midX + (PITCH.right - PITCH.midX) * 0.6, y: H / 2 };
const ATT15 = { x: PITCH.midX + (PITCH.right - PITCH.midX) * 0.4, y: H / 2 + 80 };

// 10 - Half forward (top sideline, attacking half)
const HF10_START = { x: PITCH.midX + 60, y: PITCH.top + 10 };

// 12 - Half forward (bottom sideline, attacking half)
const HF12_START = { x: PITCH.midX + 60, y: PITCH.bottom - 10 };

// 4 bunch/break players (6, 8, 9, 11)
const bunchNumbers = [6, 8, 9, 11];
const bunchStartX = PITCH.midX - 40;
const bunchEndX = PITCH.midX + (PITCH.right - PITCH.midX) * 0.3;
const bunchSpacing = (bunchEndX - bunchStartX) / 3;
const bunchJitter = [-6, 10, -3, 8];

function getBunchPositions() {
  const positions = [];
  for (let i = 0; i < 4; i++) {
    positions.push({
      x: bunchStartX + i * bunchSpacing,
      y: H / 2 + bunchJitter[i]
    });
  }
  return positions;
}

// Break positions for primary players (6, 8, 9, 11) — they go for the catch
const breakPositions = [
  { x: PITCH.line45 + 30, y: PITCH.top + 70 },          // 6 breaks towards 5's area (top)
  { x: PITCH.line45 + 30, y: PITCH.bottom - 70 },       // 8 breaks towards 7's area (bottom)
  { x: PITCH.midX + 50, y: H / 2 - 100 },              // 9 breaks towards 10's area (top attacking)
  { x: PITCH.midX + 50, y: H / 2 + 100 },              // 11 breaks towards 12's area (bottom attacking)
];

// Support positions — the partner sweeps in close to win breaking ball
// 5 supports 6, 7 supports 8, 10 supports 9, 12 supports 11
const supportPositions = [
  { x: PITCH.line45 + 30 - 25, y: PITCH.top + 70 + 20 },    // 5 sweeps in behind 6
  { x: PITCH.line45 + 30 - 25, y: PITCH.bottom - 70 - 20 }, // 7 sweeps in behind 8
  { x: PITCH.midX + 50 - 25, y: H / 2 - 100 + 20 },        // 10 sweeps in behind 9
  { x: PITCH.midX + 50 - 25, y: H / 2 + 100 - 20 },        // 12 sweeps in behind 11
];

// Break delays (staggered one-by-one)
const breakDelays = [0, 0.2, 0.4, 0.6];

// Animation timing
const PHASE_DURATION = { bunch: 2.5, break: 3.5, hold: 2.0, reset: 1.5 };
const TOTAL_DURATION = PHASE_DURATION.bunch + PHASE_DURATION.break + PHASE_DURATION.hold + PHASE_DURATION.reset;

let startTime = null;
let loopCount = 0;
let lastLoopElapsed = 0;
const pitchImg = new Image();
pitchImg.src = '../analysis/gaa-pitch-template.jpeg';

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPos(from, to, t) { return { x: lerp(from.x, to.x, t), y: lerp(from.y, to.y, t) }; }

function drawPitch() {
  if (pitchImg.complete && pitchImg.naturalWidth > 0) {
    ctx.drawImage(pitchImg, 0, 0, W, H);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#2d5a27';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(PITCH.left, PITCH.top, PITCH.right - PITCH.left, PITCH.bottom - PITCH.top);
    ctx.beginPath(); ctx.moveTo(PITCH.midX, PITCH.top); ctx.lineTo(PITCH.midX, PITCH.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PITCH.line45, PITCH.top); ctx.lineTo(PITCH.line45, PITCH.bottom); ctx.stroke();
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(PITCH.line21, PITCH.top); ctx.lineTo(PITCH.line21, PITCH.bottom); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Exclusion arc
  ctx.beginPath();
  ctx.arc(PITCH.arcCentreX, PITCH.arcCentreY, PITCH.arcRadius, -Math.PI / 2, Math.PI / 2);
  ctx.strokeStyle = 'rgba(255,100,100,0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,100,100,0.05)';
  ctx.fill();
}

function drawPlayer(x, y, color, number, radius = 10, alpha = 1.0) {
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Number inside dot
  ctx.font = `bold ${radius > 10 ? 11 : 9}px -apple-system, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(number.toString(), x, y + 1);
  ctx.textBaseline = 'alphabetic';
  ctx.globalAlpha = 1.0;
}

function drawBall(x, y, alpha = 1.0) {
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x, y, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Small cross pattern to look like a GAA ball
  ctx.beginPath();
  ctx.moveTo(x - 4, y);
  ctx.lineTo(x + 4, y);
  ctx.moveTo(x, y - 4);
  ctx.lineTo(x, y + 4);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.globalAlpha = 1.0;
}

function drawTrail(from, to, progress, color) {
  if (progress <= 0) return;
  const current = lerpPos(from, to, progress);
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(current.x, current.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.globalAlpha = 0.5;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1.0;
}

function drawArrow(from, to, progress, color) {
  if (progress < 0.1) return;
  const current = lerpPos(from, to, Math.min(progress, 1));
  const dx = current.x - from.x;
  const dy = current.y - from.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 5) return;

  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(current.x, current.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;
  ctx.stroke();

  const angle = Math.atan2(dy, dx);
  const headLen = 8;
  ctx.beginPath();
  ctx.moveTo(current.x, current.y);
  ctx.lineTo(current.x - headLen * Math.cos(angle - 0.4), current.y - headLen * Math.sin(angle - 0.4));
  ctx.moveTo(current.x, current.y);
  ctx.lineTo(current.x - headLen * Math.cos(angle + 0.4), current.y - headLen * Math.sin(angle + 0.4));
  ctx.stroke();
  ctx.globalAlpha = 1.0;
}

function animate(timestamp) {
  if (!startTime) startTime = timestamp;
  const totalElapsed = (timestamp - startTime) / 1000;
  const elapsed = totalElapsed % TOTAL_DURATION;

  // Track loop count to cycle through targets
  if (elapsed < lastLoopElapsed) {
    loopCount++;
  }
  lastLoopElapsed = elapsed;

  // Pick a different target each loop (cycles through 0,1,2,3)
  const kickTarget = loopCount % 4;

  ctx.clearRect(0, 0, W, H);
  drawPitch();

  let phase, phaseProgress;
  if (elapsed < PHASE_DURATION.bunch) {
    phase = 'bunch';
    phaseProgress = elapsed / PHASE_DURATION.bunch;
  } else if (elapsed < PHASE_DURATION.bunch + PHASE_DURATION.break) {
    phase = 'break';
    phaseProgress = (elapsed - PHASE_DURATION.bunch) / PHASE_DURATION.break;
  } else if (elapsed < PHASE_DURATION.bunch + PHASE_DURATION.break + PHASE_DURATION.hold) {
    phase = 'hold';
    phaseProgress = (elapsed - PHASE_DURATION.bunch - PHASE_DURATION.break) / PHASE_DURATION.hold;
  } else {
    phase = 'reset';
    phaseProgress = (elapsed - PHASE_DURATION.bunch - PHASE_DURATION.break - PHASE_DURATION.hold) / PHASE_DURATION.reset;
  }

  const bunchPositions = getBunchPositions();
  const globalAlpha = phase === 'reset' ? 1.0 - easeInOut(phaseProgress) * 0.3 : 1.0;

  // GK movement
  let gkPos;
  if (phase === 'bunch') {
    gkPos = GK_START;
  } else if (phase === 'break') {
    const gkProgress = easeInOut(Math.min(phaseProgress * 1.5, 1));
    gkPos = lerpPos(GK_START, GK_KICKOUT, gkProgress);
  } else if (phase === 'hold') {
    gkPos = GK_KICKOUT;
  } else {
    gkPos = lerpPos(GK_KICKOUT, GK_START, easeInOut(phaseProgress));
  }

  // Support player positions (5, 7, 10, 12 move in to support)
  const supportStarts = [WB5_START, WB7_START, HF10_START, HF12_START];
  const supportNumbers = [5, 7, 10, 12];

  for (let i = 0; i < 4; i++) {
    const from = supportStarts[i];
    const to = supportPositions[i];
    let pos;

    if (phase === 'bunch') {
      pos = from;
    } else if (phase === 'break') {
      // Support players move slightly later than their partner
      const delay = breakDelays[i] + 0.15;
      const adjustedProgress = Math.max(0, (phaseProgress - delay) / (1 - delay));
      const easedProgress = easeInOut(Math.min(adjustedProgress, 1));
      pos = lerpPos(from, to, easedProgress);
      if (easedProgress > 0) {
        drawTrail(from, to, easedProgress, 'rgba(255,255,255,0.4)');
        drawArrow(from, to, easedProgress, 'rgba(255,255,255,0.6)');
      }
    } else if (phase === 'hold') {
      pos = to;
      drawTrail(from, to, 1, 'rgba(255,255,255,0.2)');
    } else {
      pos = lerpPos(to, from, easeInOut(phaseProgress));
    }

    drawPlayer(pos.x, pos.y, GREEN, supportNumbers[i], 11, globalAlpha);
  }

  // Static players (no movement)
  drawPlayer(CB2.x, CB2.y, GREEN, 2, 11, globalAlpha);
  drawPlayer(FB3.x, FB3.y, GREEN, 3, 11, globalAlpha);
  drawPlayer(CB4.x, CB4.y, GREEN, 4, 11, globalAlpha);
  drawPlayer(ATT13.x, ATT13.y, GREEN, 13, 10, globalAlpha * 0.7);
  drawPlayer(ATT14.x, ATT14.y, GREEN, 14, 10, globalAlpha * 0.7);
  drawPlayer(ATT15.x, ATT15.y, GREEN, 15, 10, globalAlpha * 0.7);

  // Bunch/break players
  for (let i = 0; i < 4; i++) {
    const from = bunchPositions[i];
    const to = breakPositions[i];
    let pos;

    if (phase === 'bunch') {
      pos = from;
    } else if (phase === 'break') {
      const delay = breakDelays[i];
      const adjustedProgress = Math.max(0, (phaseProgress - delay) / (1 - delay));
      const easedProgress = easeInOut(Math.min(adjustedProgress, 1));
      pos = lerpPos(from, to, easedProgress);
      drawTrail(from, to, easedProgress, 'rgba(212,160,23,0.6)');
      drawArrow(from, to, easedProgress, 'rgba(212,160,23,0.8)');
    } else if (phase === 'hold') {
      pos = to;
      drawTrail(from, to, 1, 'rgba(212,160,23,0.3)');
    } else {
      pos = lerpPos(to, from, easeInOut(phaseProgress));
    }

    drawPlayer(pos.x, pos.y, GREEN, bunchNumbers[i], 11, globalAlpha);
  }

  // Highlight pairs during hold phase (pulsing ring around each pair)
  if (phase === 'hold') {
    const pulse = 0.5 + 0.5 * Math.sin(phaseProgress * Math.PI * 4);
    const pairColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a78bfa'];
    const pairLabels = ['5 & 6', '7 & 8', '9 & 10', '11 & 12'];

    for (let i = 0; i < 4; i++) {
      const primary = breakPositions[i];
      const support = supportPositions[i];
      const midX = (primary.x + support.x) / 2;
      const midY = (primary.y + support.y) / 2;
      const pairRadius = 35;

      const isTarget = (i === kickTarget);
      const ringAlpha = 0.4 + pulse * 0.4;

      ctx.beginPath();
      ctx.arc(midX, midY, pairRadius + pulse * 5, 0, Math.PI * 2);
      ctx.strokeStyle = pairColors[i];
      ctx.lineWidth = isTarget ? 4 : 3;
      ctx.globalAlpha = ringAlpha;
      ctx.stroke();

      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.fillStyle = pairColors[i];
      ctx.globalAlpha = ringAlpha;
      ctx.textAlign = 'center';
      ctx.fillText(pairLabels[i], midX, midY - pairRadius - 8);
      ctx.globalAlpha = 1.0;
    }
  }

  // Ball — released during break phase, arrives as target player reaches destination
  if (phase === 'bunch') {
    // Ball with GK
    drawBall(gkPos.x + 15, gkPos.y - 10);
  } else if (phase === 'break') {
    // Ball is kicked at the same time as the target player breaks
    const targetDelay = breakDelays[kickTarget];
    const ballStartProgress = targetDelay + 0.1; // kick just after target starts moving
    
    if (phaseProgress < ballStartProgress) {
      // Still holding the ball
      drawBall(gkPos.x + 15, gkPos.y - 10);
    } else {
      // Ball in flight — arrives when target player arrives
      const ballProgress = Math.min((phaseProgress - ballStartProgress) / (1 - ballStartProgress), 1);
      const easedBall = easeInOut(ballProgress);
      const target = breakPositions[kickTarget];
      const ballPos = lerpPos(gkPos, target, easedBall);
      const arcHeight = -60 * Math.sin(easedBall * Math.PI);
      drawBall(ballPos.x, ballPos.y + arcHeight);
    }
  } else if (phase === 'hold') {
    // Ball arrived at target
    const target = breakPositions[kickTarget];
    drawBall(target.x, target.y - 14);
  }

  // GK
  drawPlayer(gkPos.x, gkPos.y, DARK_GREEN, 1, 13, globalAlpha);

  // Phase label (outside canvas)
  const label = document.getElementById('phase-label');
  const targetNames = ['6', '8', '9', '11'];
  if (phase === 'bunch') {
    label.textContent = '☞ BUNCH — Players 6, 8, 9, 11 line up together around halfway';
  } else if (phase === 'break') {
    label.textContent = `☞ BREAK — Players scatter. GK kicks to player ${targetNames[kickTarget]}. Support players sweep in behind`;
  } else if (phase === 'hold') {
    label.textContent = `☞ PAIRS FORMED — Ball received by ${targetNames[kickTarget]}. Partner supports for any breaking ball`;
  } else {
    label.textContent = '';
  }

  // Zone label
  ctx.font = '10px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'center';
  ctx.fillText('Exclusion Zone', PITCH.arcCentreX + PITCH.arcRadius + 5, PITCH.arcCentreY);

  requestAnimationFrame(animate);
}

pitchImg.onload = () => requestAnimationFrame(animate);
pitchImg.onerror = () => requestAnimationFrame(animate);
if (pitchImg.complete) requestAnimationFrame(animate);
</script>
</body>
</html>
